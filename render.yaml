services:
  - type: web
    name: architecture-simulator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 api.app:app
    envVars:
      - key: FLASK_ENV
        value: production
